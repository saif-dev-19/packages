<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; background-color: #fff8e1; color: #333; }
    .container { max-width: 600px; margin: auto; padding: 20px; background: #ffffff; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
    .header { background-color: #FF9800; color: white; padding: 10px; text-align: center; border-radius: 8px 8px 0 0;}
    .otp { font-size: 28px; font-weight: bold; color: #4CAF50; text-align: center; margin: 20px 0; }
    .footer { font-size: 12px; color: #888; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Reset Your Password</div>
    <p>Hello {{ user_email }},</p>
    <p>We received a request to reset your password. Use this OTP:</p>
    <div class="otp">{{ otp_code }}</div>
    <p>This OTP will expire in 5 minutes.</p>
    <div class="footer">© 2026 Packages. All rights reserved.</div>
  </div>
</body>
</html>
